<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNS副業ダッシュボード</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <div>
      <p class="eyebrow">iPhone / iPad対応</p>
      <h1>SNS副業ダッシュボード</h1>
      <p class="hero-text">投稿、問い合わせ、作業予定、売上をサンプルデータでまとめて管理できます。</p>
    </div>
    <button id="exportCsv" class="primary-button">CSV出力</button>
  </header>

  <main class="app-shell">
    <section class="summary-grid" aria-label="月別集計">
      <article class="summary-card accent">
        <span>今月売上</span>
        <strong id="monthlySales">¥0</strong>
        <small id="monthlyLabel">-</small>
      </article>
      <article class="summary-card">
        <span>今月利益</span>
        <strong id="monthlyProfit">¥0</strong>
        <small>売上 - 原価</small>
      </article>
      <article class="summary-card">
        <span>未対応問い合わせ</span>
        <strong id="openInquiries">0件</strong>
        <small>早めの返信が必要</small>
      </article>
      <article class="summary-card">
        <span>作業予定</span>
        <strong id="upcomingWorks">0件</strong>
        <small>今日以降の予定</small>
      </article>
    </section>

    <section class="toolbar" aria-label="表示切り替え">
      <label>
        月で絞り込み
        <select id="monthFilter"></select>
      </label>
      <div class="tabs" role="tablist" aria-label="管理カテゴリ">
        <button class="tab active" data-view="posts">投稿</button>
        <button class="tab" data-view="inquiries">問い合わせ</button>
        <button class="tab" data-view="works">作業予定</button>
        <button class="tab" data-view="sales">売上</button>
      </div>
    </section>

    <section class="form-card" aria-labelledby="formTitle">
      <div class="section-heading">
        <div>
          <p class="eyebrow">データ入力</p>
          <h2 id="formTitle">新規追加・編集</h2>
        </div>
        <p id="formMode" class="count-badge">新規追加</p>
      </div>

      <form id="recordForm" class="record-form">
        <input type="hidden" id="recordId" />
        <label>投稿日<input type="date" id="postedAt" required /></label>
        <label>媒体
          <select id="media">
            <option>Instagram</option>
            <option>Facebook</option>
            <option>Googleビジネスプロフィール</option>
          </select>
        </label>
        <label>投稿タイトル<input type="text" id="title" placeholder="例：キャンペーン告知" required /></label>
        <label>Canva画像リンク<input type="text" id="canvaUrl" placeholder="例：Canva画像リンクメモ" /></label>
        <label class="wide">投稿本文<textarea id="body" rows="3" placeholder="投稿本文を入力"></textarea></label>
        <label>投稿ステータス
          <select id="postStatus">
            <option>下書き</option>
            <option>予約投稿</option>
            <option>投稿済み</option>
          </select>
        </label>
        <label>問い合わせ日<input type="date" id="inquiryAt" /></label>
        <label class="wide">問い合わせ内容<textarea id="inquiry" rows="2" placeholder="問い合わせ内容を入力"></textarea></label>
        <label>作業予定日<input type="date" id="workDate" /></label>
        <label class="wide">作業内容<textarea id="workDetail" rows="2" placeholder="作業内容を入力"></textarea></label>
        <label>売上金額<input type="number" id="sales" min="0" step="1" inputmode="numeric" /></label>
        <label>原価<input type="number" id="cost" min="0" step="1" inputmode="numeric" /></label>
        <label>対応状況
          <select id="responseStatus">
            <option>未対応</option>
            <option>対応中</option>
            <option>返信済み</option>
            <option>完了</option>
          </select>
        </label>
        <label class="wide">改善メモ<textarea id="memo" rows="2" placeholder="改善メモを入力"></textarea></label>
        <div class="form-actions wide">
          <button type="submit" class="primary-button" id="saveRecord">保存する</button>
          <button type="button" class="secondary-button" id="resetForm">入力をクリア</button>
        </div>
      </form>
    </section>

    <section class="content-card">
      <div class="section-heading">
        <div>
          <p class="eyebrow" id="viewEyebrow">投稿管理</p>
          <h2 id="viewTitle">投稿一覧</h2>
        </div>
        <p id="viewCount" class="count-badge">0件</p>
      </div>
      <div id="list" class="card-list"></div>
    </section>
  </main>

  <template id="itemTemplate">
    <article class="item-card">
      <div class="item-topline">
        <span class="pill"></span>
        <span class="date"></span>
      </div>
      <h3></h3>
      <p class="description"></p>
      <dl class="meta-grid"></dl>
      <p class="memo"></p>
      <div class="item-actions">
        <button type="button" class="edit-button">編集</button>
        <button type="button" class="delete-button">削除</button>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
