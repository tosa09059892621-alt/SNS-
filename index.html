<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNS副業ダッシュボード</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <div>
      <p class="eyebrow">iPhone / iPad対応</p>
      <h1>SNS副業ダッシュボード</h1>
      <p class="hero-text">投稿、問い合わせ、作業予定、売上に加えて、廃車引き取り投稿文とCanva画像用コピーを入力・保存し、編集やCSV出力までまとめて管理できます。</p>
    </div>
    <button id="exportCsv" class="primary-button">CSV出力</button>
  </header>

  <main class="app-shell">
    <section class="summary-grid" aria-label="月別集計">
      <article class="summary-card accent">
        <span>今月売上</span>
        <strong id="monthlySales">¥0</strong>
        <small id="monthlyLabel">-</small>
      </article>
      <article class="summary-card">
        <span>今月利益</span>
        <strong id="monthlyProfit">¥0</strong>
        <small id="profitLabel">売上 - 原価</small>
      </article>
      <article class="summary-card">
        <span>未対応問い合わせ</span>
        <strong id="openInquiries">0件</strong>
        <small id="inquiryLabel">未対応のみ集計</small>
      </article>
      <article class="summary-card">
        <span>作業予定</span>
        <strong id="upcomingWorks">0件</strong>
        <small id="workLabel">今日以降の予定</small>
      </article>
    </section>

    <section class="toolbar" aria-label="表示切り替え">
      <label>
        月で絞り込み
        <select id="monthFilter"></select>
      </label>
      <div class="tabs" role="tablist" aria-label="管理カテゴリ">
        <button class="tab active" data-view="posts">投稿</button>
        <button class="tab" data-view="inquiries">問い合わせ</button>
        <button class="tab" data-view="works">作業予定</button>
        <button class="tab" data-view="sales">売上</button>
      </div>
    </section>

    <section class="content-card">
      <div class="section-heading">
        <div>
          <p class="eyebrow" id="viewEyebrow">投稿管理</p>
          <h2 id="viewTitle">投稿一覧</h2>
        </div>
        <p id="viewCount" class="count-badge">0件</p>
      </div>
      <form id="entryForm" class="entry-form" autocomplete="off">
        <div class="form-heading">
          <div>
            <p class="eyebrow" id="formEyebrow">新規追加</p>
            <h3 id="formTitle">投稿を追加</h3>
          </div>
          <button type="button" id="cancelEdit" class="ghost-button" hidden>編集をキャンセル</button>
        </div>
        <div id="formFields" class="form-grid" aria-live="polite"></div>
        <div class="form-actions">
          <button type="button" id="bulkCreatePosts" class="secondary-button">7日分まとめて作成</button>
          <button type="submit" id="saveEntry" class="primary-button">保存する</button>
        </div>
        <p id="copyStatus" class="copy-status" role="status" aria-live="polite"></p>
      </form>
      <section id="postScheduleList" class="post-schedule-list" aria-label="投稿予定リスト">
        <div class="schedule-heading">
          <div>
            <p class="eyebrow">投稿予定リスト</p>
            <h3>投稿予定日順にカードで管理</h3>
          </div>
          <p class="schedule-note">投稿後の反応・問い合わせもここで更新できます</p>
        </div>
      </section>
      <div id="list" class="card-list"></div>
    </section>
  </main>

  <template id="itemTemplate">
    <article class="item-card">
      <div class="item-topline">
        <span class="pill"></span>
        <span class="date"></span>
      </div>
      <h3></h3>
      <p class="description"></p>
      <dl class="meta-grid"></dl>
      <p class="memo"></p>
      <div class="item-actions">
        <button type="button" class="secondary-button mark-posted-button">投稿済みにする</button>
        <button type="button" class="ghost-button edit-button">編集</button>
        <button type="button" class="danger-button delete-button">削除</button>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
